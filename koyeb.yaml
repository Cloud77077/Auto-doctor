name: otp-automation

services:
  - name: web
    type: web
    git:
      branch: main
    build:
      buildpack: nodejs
      build_command: "npm install && npx playwright install chromium"
    run_command: "node backend/server.js"
    ports:
      - port: 3000
        protocol: http
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
    instance_types: nano
